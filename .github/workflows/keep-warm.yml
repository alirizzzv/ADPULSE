name: Keep deploy warm

# Render's free tier spins the service down after ~15 min of inactivity, which
# causes a 30-60s cold start (models reload) on the next visit. This job pings
# the health endpoint every 10 minutes to keep the instance awake for visitors.
#
# Notes / honest caveats:
#   - GitHub cron can run a few minutes late under load; 10-min interval leaves
#     buffer against Render's 15-min idle window.
#   - Scheduled workflows auto-disable after 60 days of no repo activity (GitHub
#     policy) — fine for an active project; re-enable from the Actions tab if so.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # allow manual "ping now" from the Actions tab

# Don't pile up overlapping pings if a run is slow.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health (with retries)
        run: |
          URL="https://adpulse-457r.onrender.com/api/health"
          # A *fully cold* Render free instance has to pull the Docker image,
          # start Python, and load the models before it answers — Render holds
          # the request open the whole time, so curl just waits. The old 90s
          # --max-time was shorter than that cold boot, so every retry hit the
          # same still-booting instance and timed out (a 5x90s run = ~9 min of
          # "all jobs failed"). Give the first ping enough headroom to actually
          # wake the box; once it's up, subsequent pings are fast.
          for i in 1 2 3; do
            code=$(curl -fsS -L --max-time 240 -o /dev/null -w "%{http_code}" "$URL") && {
              echo "Ping $i: HTTP $code — awake."; exit 0;
            }
            echo "Ping $i failed (likely cold start in progress), retrying in 30s..."; sleep 30
          done
          echo "All pings failed — service may be down."; exit 1
